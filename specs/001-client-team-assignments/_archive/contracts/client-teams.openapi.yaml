openapi: 3.0.3
info:
  title: pgi-service-pgi-api · Client Teams (US1)
  version: 0.1.0
  description: |
    Endpoints para constituir y consultar el equipo de un cliente por departamento.
    Scope: US1 (P1) — sin cierre (US4) ni histórico (US3).

servers:
  - url: https://pgi-api.afianza.internal
    description: Production
  - url: http://localhost:3000
    description: Local dev

security:
  - azureAdJwt: []

paths:
  /clients/{clientId}/teams:
    get:
      summary: List teams for a client (all departments, active and closed)
      operationId: listClientTeams
      parameters:
        - $ref: '#/components/parameters/ClientId'
        - in: query
          name: department
          required: false
          schema:
            $ref: '#/components/schemas/Department'
        - in: query
          name: includeClosed
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: List of teams with their members embedded
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClientTeam'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      summary: Create a new team for a client in a department
      description: |
        Requires permission `CLIENT_ASSIGNMENT_EDIT`. Rejects with 422 if the client
        has no active `ProvidedService` for the requested department (FR-017).
        The team starts with status `incomplete` until the responsable + at least
        one asesor + isPrimaryAdvisor are added and cobertura sums reach 100%.
      operationId: createClientTeam
      parameters:
        - $ref: '#/components/parameters/ClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientTeamRequest'
      responses:
        '201':
          description: Team created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientTeam'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /clients/{clientId}/teams/{teamId}:
    get:
      summary: Get a single team with embedded active members
      operationId: getClientTeam
      parameters:
        - $ref: '#/components/parameters/ClientId'
        - $ref: '#/components/parameters/TeamId'
      responses:
        '200':
          description: Team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientTeam'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    azureAdJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ClientId:
      in: path
      name: clientId
      required: true
      schema:
        type: string
        format: uuid
    TeamId:
      in: path
      name: teamId
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Department:
      type: string
      enum: [fiscal, laboral]

    TeamStatus:
      type: string
      enum: [incomplete, active, closed]
      description: Derived from members and dates — never persisted.

    CreateClientTeamRequest:
      type: object
      required: [department, startDate]
      properties:
        department:
          $ref: '#/components/schemas/Department'
        startDate:
          type: string
          format: date
          description: Must be the first day of a month (FR-012).

    ClientTeam:
      type: object
      required: [id, clientId, department, startDate, status, version, createdAt, updatedAt, members]
      properties:
        id:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        department:
          $ref: '#/components/schemas/Department'
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        status:
          $ref: '#/components/schemas/TeamStatus'
        version:
          type: integer
          minimum: 1
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        members:
          type: array
          description: Active members of this team (embedded aggregate — REST design rule)
          items:
            $ref: '#/components/schemas/ClientTeamAssignmentSummary'
        coverageSums:
          type: object
          description: |
            Aggregated cobertura totals for (client, department), across ALL teams of the
            same client+department — used by the UI banner. Provided here as a convenience;
            the actual validation logic lives in the service.
          properties:
            asesorTotal:
              type: integer
              description: Sum of percentages of all active asesores in (client, department)
            tecnicoTotal:
              type: integer
              nullable: true
              description: Sum of percentages of all active técnicos. Null = no técnicos in this client+department (cobertura N/A).

    ClientTeamAssignmentSummary:
      type: object
      description: Read-only projection of a ClientAssignment — full CRUD in client-team-assignments.openapi.yaml
      properties:
        id:
          type: string
          format: uuid
        employeeId:
          type: string
          format: uuid
        role:
          type: string
          enum: [responsable, coordinador, asesor, tecnico]
        percentage:
          type: integer
          minimum: 1
          maximum: 100
        dateFrom:
          type: string
          format: date
        dateTo:
          type: string
          format: date
          nullable: true
        isPrimaryAdvisor:
          type: boolean

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Domain error code (e.g. CLIENT_TEAM_NO_PROVIDED_SERVICE_FOR_DEPARTMENT)
        message:
          type: string
        details:
          type: object
          additionalProperties: true

  responses:
    Forbidden:
      description: Missing CLIENT_ASSIGNMENT_READ or CLIENT_ASSIGNMENT_EDIT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Client or team not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Domain validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
