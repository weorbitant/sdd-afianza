openapi: 3.1.0
info:
  title: pgi-api · Client Team Assignments
  description: |
    Endpoints REST de pgi-api para gestionar el equipo de un cliente como
    tramos temporales de asignaciones (`ClientTeamAssignment`) y para consultar
    el log de cambios (`ClientTeamAssignmentChange`).

    **Scope**: cubre US-01 (alta inicial), US-02 (edición mes en curso), US-03
    (cambios futuros), US-05 (log de cambios). US-04 (onboarding AMQP) no entra
    en este contract REST porque su entrada es vía RabbitMQ (ver
    `contracts/amqp/`).

    **Modelo**: cada snapshot es una foto completa del `(client, department)` —
    todos los equipos, todos los roles — a partir de una fecha efectiva. El
    engine diff la foto contra el estado almacenado y materializa aperturas/
    cierres de tramos half-open `[dateFrom, dateTo)`. Ver spec §4.1 (governing
    model) y TDD §2/§4.

    **Convenciones aplicadas** (alineadas a pgi-api):
    - Path versioning: `@Controller({ path, version: '1' })` → `/api/v1/...`.
    - URLs como recursos puros, sin verbos en path.
    - Response de lista: `{ data: T[], total: number, ...extras }`.
    - Response de creación: `{ id }`. Updates devuelven 204.
    - Errores: `NestJS exception filters` → `{ statusCode, message, error }`.
    - Auth: `@PermissionsRequired(BackofficePermissions.CLIENT_ASSIGNMENT_*)`.
    - Optimistic concurrency: campo `version` en body. Conflicto = 409.

  version: 1.0.0

servers:
  - url: https://pgi-api.afianza.internal/api/v1
    description: Production
  - url: https://pgi-api.staging.afianza.internal/api/v1
    description: Staging
  - url: http://localhost:3010/api/v1
    description: Local

security:
  - azureAdJwt: []

tags:
  - name: team-assignments
    description: |
      Gestión del equipo de un cliente mediante snapshots temporales.
      Entity de dominio `ClientTeamAssignment`.
  - name: team-assignment-changes
    description: |
      Log de cambios sobre las asignaciones (US-05). Read-only.
      Entity de dominio `ClientTeamAssignmentChange`.

paths:

  /clients/{clientId}/team-assignments:
    parameters:
      - $ref: '#/components/parameters/ClientIdPath'

    get:
      tags: [team-assignments]
      summary: Listar asignaciones vigentes a una fecha
      description: |
        Devuelve los tramos activos en `date` filtrados por `department`.
        `date` por defecto = hoy; acepta cualquier fecha (pasada o futura).

        Cada miembro lleva `inClientSince` (campo derivado server-side,
        spec §4). Incluye `coverage`, `mainAsesorPresent` y `status` para
        que el FE renderice el banner "equipo incompleto" sin un segundo
        request.

        Un tramo está activo en `t` ssi `dateFrom <= t AND (dateTo IS NULL
        OR dateTo > t)` (half-open `[dateFrom, dateTo)`).

        Requiere `BackofficePermissions.CLIENT_ASSIGNMENT_VIEW`.
      operationId: listClientTeamAssignments
      parameters:
        - name: department
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Department'
        - name: date
          in: query
          required: false
          description: Fecha de consulta (default hoy).
          schema:
            type: string
            format: date
            example: "2026-06-15"
      responses:
        '200':
          description: Lista vigente con datos derivados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAssignmentsResponse'
              example:
                data:
                  - id: "a1b2c3d4-0000-0000-0000-000000000001"
                    clientTeamId: "t1b2c3d4-0000-0000-0000-000000000001"
                    clientId: "c1b2c3d4-0000-0000-0000-000000000001"
                    department: fiscal
                    employee:
                      id: "e1000000-0000-0000-0000-000000000001"
                      displayName: "Alfonso García"
                      email: "alfonso@afianza-ac.es"
                    role: responsable
                    percentage: 100
                    dateFrom: "2026-05-20"
                    dateTo: null
                    isMain: false
                    inClientSince: "2026-05-20"
                    version: 1
                  - id: "a1b2c3d4-0000-0000-0000-000000000002"
                    clientTeamId: "t1b2c3d4-0000-0000-0000-000000000001"
                    clientId: "c1b2c3d4-0000-0000-0000-000000000001"
                    department: fiscal
                    employee:
                      id: "e1000000-0000-0000-0000-000000000002"
                      displayName: "David Martínez"
                      email: "david@afianza-ac.es"
                    role: asesor
                    percentage: 100
                    dateFrom: "2026-06-01"
                    dateTo: null
                    isMain: true
                    inClientSince: "2026-06-01"
                    version: 1
                total: 2
                coverage:
                  asesores: 100
                  tecnicos: null
                mainAsesorPresent: true
                status: complete
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

    put:
      tags: [team-assignments]
      summary: Aplicar un snapshot completo del equipo
      description: |
        **Operación principal del governing model** (US-01, US-02, US-03).
        Recibe la foto completa del `(client, department)` — todos los
        equipos, todos los roles — y el engine calcula el diff contra el
        estado almacenado.

        `dateFrom` puede ser cualquier día del mes objetivo; el engine lo
        normaliza a día 1 (`F` si es el mes en curso). Meses pasados → 422.

        El engine ejecuta dentro de **una sola transacción** con
        `SELECT … FOR UPDATE` sobre la fila `client` (FR-024):

        Por `(clientTeamId, employeeId, role)` comparando estado en `D` vs.
        snapshot:
        - **Igual**: no-op (sin cambios, sin eventos).
        - **Nuevo**: INSERT `[D, N)` donde `N` = siguiente snapshot
          dept-wide (FR-006-bis).
        - **Ausente**: tramo histórico (`dateFrom < F`) → cierre con
          `dateTo = D` (half-open). Tramo provisional (`dateFrom ≥ F`) →
          DELETE físico + log `action='voided'`.
        - **Atributos distintos**: CLOSE + OPEN en `D`.

        RESPONSABLE y COORDINADOR tienen siempre `percentage = 100`
        (sistema, no viene en el payload — D4/L10).

        Idempotente: mismo snapshot + misma fecha → cero escrituras, cero
        eventos (INV-8).

        Requiere `BackofficePermissions.CLIENT_ASSIGNMENT_EDIT`.
      operationId: applyTeamSnapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamSnapshotRequest'
            example:
              department: fiscal
              dateFrom: "2026-06-15"
              teams:
                - clientTeamId: "t1b2c3d4-0000-0000-0000-000000000001"
                  responsable: "e1000000-0000-0000-0000-000000000001"
                  coordinador: "e2000000-0000-0000-0000-000000000002"
                  asesores:
                    - employeeId: "e3000000-0000-0000-0000-000000000003"
                      percentage: 60
                      isMain: true
                    - employeeId: "e4000000-0000-0000-0000-000000000004"
                      percentage: 40
                      isMain: false
                  tecnicos:
                    - employeeId: "e5000000-0000-0000-0000-000000000005"
                      percentage: 100
      responses:
        '204': { description: Snapshot aplicado. }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /clients/{clientId}/team-assignments/{id}:
    parameters:
      - $ref: '#/components/parameters/ClientIdPath'
      - $ref: '#/components/parameters/AssignmentIdPath'

    get:
      tags: [team-assignments]
      summary: Recuperar una asignación
      description: Requiere `BackofficePermissions.CLIENT_ASSIGNMENT_VIEW`.
      operationId: getClientTeamAssignment
      responses:
        '200':
          description: Detalle de la asignación.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

    put:
      tags: [team-assignments]
      summary: Modificar metadato de un tramo vivo
      description: |
        Cambios puntuales sobre un único tramo sin afectar a otros:
        - **Cambiar `isMain`**: envía `isMain` + `version`. El engine
          valida unicidad de main (FR-011) e inserta change con
          `action='main_changed'`.
        - **Cerrar el tramo** (salida sin sustituto): envía `dateTo` +
          `version`. `dateTo` es el half-open upper bound (primer día del
          mes en que deja de estar activo). Meses pasados → 422.

        Cambios de `percentage` o `role` van por `PUT` sobre la colección
        (crean tramo nuevo vía diff del snapshot).

        Requiere `BackofficePermissions.CLIENT_ASSIGNMENT_EDIT`.
      operationId: updateClientTeamAssignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAssignmentRequest'
            examples:
              change_main:
                summary: Cambiar asesor principal
                value: { isMain: true, version: 2 }
              close_tramo:
                summary: Cerrar tramo (salida sin sustituto)
                value: { dateTo: "2026-07-01", version: 2 }
      responses:
        '204': { description: Cambio aplicado. }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

    delete:
      tags: [team-assignments]
      summary: Eliminar un tramo provisional (void FR-007)
      description: |
        Solo aplica a tramos con `dateFrom ≥ F` (rewrite frontier =
        primer día del mes en curso). El backend ejecuta `DELETE` físico.
        Antes del borrado inserta una fila en
        `client_team_assignment_change` con `action='voided'` para
        preservar trazabilidad. También publica un evento
        `pgi-api.v1.client-team-assignment.closed` con
        `closureKind='voided'`.

        Si se intenta sobre un tramo histórico (`dateFrom < F`) → 422.

        Requiere `BackofficePermissions.CLIENT_ASSIGNMENT_EDIT`.
      operationId: voidClientTeamAssignment
      responses:
        '204': { description: Tramo eliminado. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /clients/{clientId}/team-assignment-changes:
    parameters:
      - $ref: '#/components/parameters/ClientIdPath'

    get:
      tags: [team-assignment-changes]
      summary: Log de cambios sobre el equipo (US-05)
      description: |
        Devuelve los cambios registrados en `client_team_assignment_change`
        para un cliente y departamento, en orden cronológico descendente.
        Por defecto, los últimos 90 días.

        Los campos `*Before`/`*After` son `null` cuando no aplican a la
        `action`.

        Requiere `BackofficePermissions.CLIENT_ASSIGNMENT_VIEW`.
      operationId: listClientTeamAssignmentChanges
      parameters:
        - name: department
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Department'
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Log paginado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListChangesResponse'
              example:
                data:
                  - id: "ch000001-0000-0000-0000-000000000001"
                    clientTeamAssignmentId: "a1b2c3d4-0000-0000-0000-000000000001"
                    action: closed
                    percentageBefore: 100
                    percentageAfter: null
                    dateFromBefore: "2026-05-20"
                    dateFromAfter: null
                    dateToBefore: null
                    dateToAfter: "2026-06-01"
                    isMainBefore: true
                    isMainAfter: null
                    createdAt: "2026-06-05T10:30:00Z"
                    createdBy: "alfonso.domenech@afianza-ac.es"
                    updatedAt: null
                    updatedBy: null
                total: 2
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

components:

  parameters:
    ClientIdPath:
      name: clientId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssignmentIdPath:
      name: id
      in: path
      required: true
      description: ID de la asignación (`client_team_assignment.id`).
      schema:
        type: string
        format: uuid

  schemas:

    Department:
      type: string
      enum: [fiscal, laboral]

    Role:
      type: string
      enum: [responsable, coordinador, asesor, tecnico]

    Action:
      type: string
      enum:
        - opened
        - closed
        - percentage_changed
        - role_changed
        - main_changed
        - voided

    EmployeeRef:
      type: object
      required: [id, displayName, email]
      properties:
        id:          { type: string, format: uuid }
        displayName: { type: string }
        email:       { type: string, format: email }

    # ── Snapshot request (TDD §2) ──────────────────────────────────────────

    TeamSnapshotRequest:
      type: object
      required: [department, dateFrom, teams]
      additionalProperties: false
      description: |
        Foto completa del `(client, department)`. El engine la diff contra
        el estado almacenado y materializa las operaciones temporales.
        `dateFrom` puede ser cualquier día del mes objetivo; el engine lo
        normaliza a día 1 (o lo clampea con la fecha de onboarding en el
        mismo mes — D13).
      properties:
        department:
          $ref: '#/components/schemas/Department'
        dateFrom:
          type: string
          format: date
          description: |
            Cualquier día del mes efectivo (e.g. "2026-06-15"). El engine
            normaliza a día 1. Mes pasado → 422.
          example: "2026-06-15"
        teams:
          type: array
          minItems: 1
          description: |
            Todos los equipos del departamento (D14 — grow-only: debe
            incluir todos los `clientTeamId` existentes; puede añadir
            nuevos con `clientTeamId` ausente).
          items:
            $ref: '#/components/schemas/TeamSnapshotItem'

    TeamSnapshotItem:
      type: object
      required: [responsable, asesores]
      additionalProperties: false
      description: |
        Un equipo dentro del snapshot. `clientTeamId` ausente = equipo
        nuevo (el engine crea un `client_team`). Presente = equipo
        existente (D10). `clientTeamId` desconocido o de otro
        cliente/departamento → 422 (L12).
      properties:
        clientTeamId:
          type: string
          format: uuid
          description: Ausente en teams nuevos; obligatorio para existentes.
        responsable:
          type: string
          format: uuid
          description: |
            Exactamente 1 por equipo (INV-5). El engine fija
            `percentage=100` — no va en el payload (D4/L10).
        coordinador:
          type: string
          format: uuid
          nullable: true
          description: |
            0..1 por equipo (INV-5). `percentage=100` system-set.
        asesores:
          type: array
          minItems: 1
          description: |
            ≥1 por equipo (INV-5). `Σ percentage` cross-team per
            `(client, department)` debe ser exactamente 100 (INV-2/D4).
            Exactamente 1 `isMain=true` cross-team (INV-3/D5).
          items:
            $ref: '#/components/schemas/AsesorSnapshotMember'
        tecnicos:
          type: array
          default: []
          description: |
            0..N. Si hay ≥1 técnico en el departamento, `Σ percentage`
            cross-team debe ser exactamente 100 (INV-2/D4).
          items:
            $ref: '#/components/schemas/TecnicoSnapshotMember'

    AsesorSnapshotMember:
      type: object
      required: [employeeId, percentage, isMain]
      additionalProperties: false
      properties:
        employeeId:
          type: string
          format: uuid
        percentage:
          type: integer
          minimum: 1
          maximum: 100
          description: Entero (D4). No decimales → 422 (L6).
        isMain:
          type: boolean
          description: |
            Exactamente 1 `true` cross-team por `(client, department)`.
            0 o >1 → 422 (L3/G2/G3).

    TecnicoSnapshotMember:
      type: object
      required: [employeeId, percentage]
      additionalProperties: false
      properties:
        employeeId:
          type: string
          format: uuid
        percentage:
          type: integer
          minimum: 1
          maximum: 100

    # ── Patch request (metadato puntual) ───────────────────────────────────

    UpdateAssignmentRequest:
      type: object
      required: [version]
      additionalProperties: false
      description: |
        Al menos uno de `isMain` o `dateTo` debe estar presente.
      properties:
        isMain:
          type: boolean
          description: Solo válido si `role=asesor`.
        dateTo:
          type: string
          format: date
          description: |
            Cierra el tramo (half-open upper bound). El tramo cubrirá
            `[dateFrom, dateTo)`. Debe ser primer día de un mes ≥ F; si
            el caller envía mid-month el backend lo normaliza al primer
            día del mes siguiente.
        version:
          type: integer

    # ── Response schemas ───────────────────────────────────────────────────

    Assignment:
      type: object
      required:
        - id
        - clientTeamId
        - clientId
        - department
        - employee
        - role
        - percentage
        - dateFrom
        - dateTo
        - isMain
        - inClientSince
        - version
      properties:
        id:            { type: string, format: uuid }
        clientTeamId:  { type: string, format: uuid }
        clientId:
          type: string
          format: uuid
          description: Resuelto vía JOIN — no persiste en `client_team_assignment`.
        department:    { $ref: '#/components/schemas/Department' }
        employee:      { $ref: '#/components/schemas/EmployeeRef' }
        role:          { $ref: '#/components/schemas/Role' }
        percentage:    { type: integer }
        dateFrom:      { type: string, format: date }
        dateTo:
          type: string
          format: date
          nullable: true
          description: Half-open upper bound. `null` = tramo abierto.
        isMain:        { type: boolean }
        inClientSince:
          type: string
          format: date
          description: |
            Antigüedad continua del empleado en el cliente, calculada
            server-side (spec §4 — cadena sin huecos de tramos consecutivos).
        version:       { type: integer }

    ListAssignmentsResponse:
      type: object
      required: [data, total, coverage, mainAsesorPresent, status]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Assignment' }
        total:
          type: integer
        coverage:
          type: object
          required: [asesores, tecnicos]
          properties:
            asesores: { type: integer }
            tecnicos:
              type: integer
              nullable: true
              description: '`null` = sin técnicos (cobertura N/A).'
        mainAsesorPresent: { type: boolean }
        status:
          type: string
          enum: [complete, incomplete]

    AssignmentChange:
      type: object
      required: [id, clientTeamAssignmentId, action, createdAt, createdBy]
      properties:
        id:                      { type: string, format: uuid }
        clientTeamAssignmentId:  { type: string, format: uuid }
        action:                  { $ref: '#/components/schemas/Action' }
        employeeIdBefore:        { type: string, format: uuid, nullable: true }
        employeeIdAfter:         { type: string, format: uuid, nullable: true }
        roleBefore:              { $ref: '#/components/schemas/Role', nullable: true }
        roleAfter:               { $ref: '#/components/schemas/Role', nullable: true }
        percentageBefore:        { type: integer, nullable: true }
        percentageAfter:         { type: integer, nullable: true }
        isMainBefore:            { type: boolean, nullable: true }
        isMainAfter:             { type: boolean, nullable: true }
        dateFromBefore:          { type: string, format: date, nullable: true }
        dateFromAfter:           { type: string, format: date, nullable: true }
        dateToBefore:            { type: string, format: date, nullable: true }
        dateToAfter:             { type: string, format: date, nullable: true }
        createdAt:               { type: string, format: date-time }
        updatedAt:               { type: string, format: date-time, nullable: true }
        createdBy:               { type: string }
        updatedBy:               { type: string, nullable: true }

    ListChangesResponse:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AssignmentChange' }
        total: { type: integer }

    NestException:
      type: object
      required: [statusCode, message, error]
      properties:
        statusCode: { type: integer }
        message:
          oneOf:
            - type: string
            - type: array
              items: { type: string }
        error: { type: string }

  responses:
    BadRequest:
      description: Body o query malformado.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/NestException' }
    Unauthorized:
      description: Token Azure AD ausente o inválido.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/NestException' }
    Forbidden:
      description: Falta permiso `CLIENT_ASSIGNMENT_VIEW/EDIT`.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/NestException' }
    NotFound:
      description: Cliente, asignación o empleado no existe.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/NestException' }
    Conflict:
      description: Version conflict u otro conflicto de estado.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/NestException' }
    UnprocessableEntity:
      description: |
        Reglas de negocio violadas: mes pasado (FR-003/K3), cliente sin
        `ProvidedService` (FR-012), snapshot inválido (INV-2/INV-3/INV-5/
        D14), `clientTeamId` desconocido (L12), snapshot omite equipo
        existente (L13), void sobre tramo histórico, etc.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/NestException' }

  securitySchemes:
    azureAdJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
