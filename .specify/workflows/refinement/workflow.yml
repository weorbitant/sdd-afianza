schema_version: "1.0"
workflow:
  id: "refinement"
  name: "Feature Refinement"
  version: "1.2.0"
  author: "afianza-local"
  description: "Fetch Jira Epic → spec → clarify → checklist → HTML preview → push Stories to Jira → bootstrap decisions.md."

requires:
  speckit_version: ">=0.7.2"
  integrations:
    any: ["copilot", "claude", "gemini"]

inputs:
  epic_key:
    type: string
    required: true
    prompt: "Jira Epic key (e.g. DEVPT-518)"
  figma_url:
    type: string
    required: false
    prompt: "Figma file URL (deja vacío para omitir)"
  integration:
    type: string
    default: "claude"
    prompt: "Integration a usar (e.g. claude, copilot, gemini)"

outputs:
  feature_dir: "{{ steps.specify.output.feature_dir }}"
  epic_key: "{{ inputs.epic_key }}"
  story_keys: "{{ steps.jira-push.output.story_keys }}"
  decisions_file: "{{ steps.bootstrap-decisions.output.path }}"

steps:
  - id: fetch-epic
    command: speckit.atlassian-sync.fetch
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.epic_key }}"

  - id: fetch-designs
    type: if
    condition: "{{ inputs.figma_url != '' }}"
    then:
      - id: figma-fetch
        command: speckit.figma-export.fetch
        integration: "{{ inputs.integration }}"
        input:
          args: "{{ inputs.figma_url }}"

  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ steps.fetch-epic.output.spec_input }}"

  - id: clarify-loop
    type: do-while
    condition: "{{ steps.clarify-gate.output.choice == 'yes' }}"
    max_iterations: 5
    steps:
      - id: clarify
        command: speckit.clarify
        integration: "{{ inputs.integration }}"
        input:
          args: "{{ inputs.epic_key }}"
      - id: clarify-gate
        type: gate
        message: "¿Quedan preguntas abiertas sin resolver? Selecciona 'yes' para volver a clarificar."
        options: [yes, no]

  - id: planning-readiness-gate
    type: gate
    message: |
      Antes de generar el checklist, comprueba la tabla "Open Questions" en spec.md.
      ¿Hay decisiones marcadas como bloqueantes para el data model o la arquitectura que aún no tienen respuesta?
      - 'ready'   → no hay bloqueantes críticos sin resolver, continuar al checklist
      - 'blocked' → hay decisiones estructurales pendientes; el workflow se detiene para escalarlas
    options: [ready, blocked]
    on_blocked: abort

  - id: checklist
    command: speckit.checklist
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ steps.fetch-epic.output.epic_summary }}"

  - id: export-spec
    command: md-html-export.export
    integration: "{{ inputs.integration }}"

  - id: review-spec
    type: gate
    message: "Revisa la spec en HTML. ¿Todo correcto para subir a Jira?"
    options: [approve, reject]
    on_reject: abort

  - id: jira-push
    command: speckit.atlassian-sync.push
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.epic_key }}"

  - id: bootstrap-decisions
    command: shell.exec
    integration: "{{ inputs.integration }}"
    input:
      args: |
        if [ ! -f "{{ steps.specify.output.feature_dir }}/decisions.md" ]; then
          cp .specify/templates/refinement/decisions.template.md "{{ steps.specify.output.feature_dir }}/decisions.md"
          sed -i.bak "s/\[EPIC-KEY\]/{{ inputs.epic_key }}/g" "{{ steps.specify.output.feature_dir }}/decisions.md"
          rm "{{ steps.specify.output.feature_dir }}/decisions.md.bak"
        fi
