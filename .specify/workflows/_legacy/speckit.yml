schema_version: "1.0"
workflow:
  id: "speckit"
  name: "Full SDD Cycle"
  version: "1.0.0"
  author: "GitHub"
  description: "Runs specify → plan → tasks → implement with review gates"

requires:
  speckit_version: ">=0.7.2"
  integrations:
    any: ["copilot", "claude", "gemini"]

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe what you want to build"
  integration:
    type: string
    default: "copilot"
    prompt: "Integration to use (e.g. claude, copilot, gemini)"
  scope:
    type: string
    default: "full"
    enum: ["full", "backend-only", "frontend-only"]
  epic_key:
    type: string
    required: false
    prompt: "Jira Epic key to link stories to (e.g. DEVPT-518). Leave empty to skip Jira sync."
  base_branch:
    type: string
    default: "main"
    prompt: "Base branch for the Pull Request"

steps:
  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-spec
    type: gate
    message: "Review the generated spec before planning."
    options: [approve, reject]
    on_reject: abort

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-plan
    type: gate
    message: "Review the plan before generating tasks."
    options: [approve, reject]
    on_reject: abort

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: jira-create
    command: speckit.atlassian-sync.push
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.epic_key }}"
    skip_if: "{{ inputs.epic_key == '' }}"

  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-implementation
    type: gate
    message: "Revisa la implementación antes de crear el PR. ¿Todo el código está listo?"
    options: [approve, reject]
    on_reject: abort

  - id: create-pr
    command: speckit.git-pr.create
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.base_branch }}"

  - id: review-pr
    command: ce-code-review
    integration: "{{ inputs.integration }}"
