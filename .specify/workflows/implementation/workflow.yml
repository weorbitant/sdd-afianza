schema_version: "1.0"
workflow:
  id: "implementation"
  name: "Feature Implementation"
  version: "2.0.1"
  author: "afianza-local"
  description: "Implement → review → PR. Deploy and QA handled separately via ops-suite."

requires:
  speckit_version: ">=0.7.2"
  integrations:
    any: ["copilot", "claude", "gemini"]

inputs:
  integration:
    type: string
    default: "copilot"
    prompt: "Integration to use (e.g. claude, copilot, gemini)"
  base_branch:
    type: string
    default: "main"
    prompt: "Base branch for the Pull Request"

steps:
  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"

  - id: export-tasks
    command: speckit.md-html-export.export
    integration: "{{ inputs.integration }}"

  - id: review-implementation
    type: gate
    message: "Revisa el código generado. ¿Todo listo para abrir el PR?"
    options: [approve, reject]
    on_reject: abort

  - id: create-pr
    command: speckit.git-pr.create
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.base_branch }}"
