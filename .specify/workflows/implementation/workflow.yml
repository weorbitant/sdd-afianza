schema_version: "1.0"
workflow:
  id: "implementation"
  name: "Feature Implementation"
  version: "2.1.0"
  author: "afianza-local"
  description: "Implement → review → PR → automated code review → Jira transition. Deploy and QA handled separately via ops-suite."

requires:
  speckit_version: ">=0.7.2"
  integrations:
    any: ["copilot", "claude", "gemini"]

inputs:
  integration:
    type: string
    default: "claude"
    prompt: "Integration a usar (e.g. claude, copilot, gemini)"
  base_branch:
    type: string
    default: "main"
    prompt: "Rama base para el Pull Request"
  story_key:
    type: string
    required: false
    prompt: "Jira Story key (e.g. DEVPT-519). Deja vacío para omitir la transición en Jira."
  transition_to:
    type: string
    default: "In Review"
    prompt: "Estado destino en Jira tras abrir el PR (e.g. 'In Review', 'Code Review')."

outputs:
  feature_dir: "{{ steps.implement.output.feature_dir }}"
  branch: "{{ steps.create-pr.output.branch }}"
  pr_url: "{{ steps.create-pr.output.pr_url }}"

steps:
  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"

  - id: export-tasks
    command: md-html-export.export
    integration: "{{ inputs.integration }}"

  - id: review-implementation
    type: gate
    message: "Revisa el código generado. ¿Todo listo para abrir el PR?"
    options: [approve, reject]
    on_reject: abort

  - id: create-pr
    command: speckit.git-pr.create
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.base_branch }}"

  - id: code-review
    command: ce-code-review
    integration: "{{ inputs.integration }}"

  - id: transition-jira
    type: if
    condition: "{{ inputs.story_key != '' }}"
    then:
      - id: jira-transition
        command: speckit.atlassian-sync.transition
        integration: "{{ inputs.integration }}"
        input:
          args: "{{ inputs.story_key }} {{ inputs.transition_to }}"
