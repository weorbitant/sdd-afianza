schema_version: "1.0"
workflow:
  id: "debugging"
  name: "Error Debugging"
  version: "1.0.0"
  author: "afianza-local"
  description: >
    Fetch ticket (optional) → analyze error → classify + hypotheses → propose fixes
    → gate → fix branch (optional). Accepts free-text, stack trace, logs, or Jira ticket key.

requires:
  speckit_version: ">=0.7.2"
  integrations:
    any: ["copilot", "claude", "gemini"]

inputs:
  error_input:
    type: string
    required: true
    prompt: "Describe el error, pega el stack trace / log, o introduce un ticket ID de Jira"
  ticket_key:
    type: string
    required: false
    prompt: "Jira ticket key (e.g. PLAT-847). Deja vacío para omitir."
  integration:
    type: string
    default: "claude"
    prompt: "Integration to use (e.g. claude, copilot, gemini)"
  base_branch:
    type: string
    required: false
    prompt: "Rama base para el PR del fix (e.g. main). Deja vacío para omitir la creación del PR."

steps:
  - id: fetch-ticket
    type: if
    condition: "{{ inputs.ticket_key != '' }}"
    then:
      - id: jira-fetch
        command: speckit.atlassian-sync.fetch
        integration: "{{ inputs.integration }}"
        input:
          args: "{{ inputs.ticket_key }}"

  - id: analyze
    command: debug-error
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.error_input }}"

  - id: review-analysis
    type: gate
    message: |
      Revisa el Debug Report generado.
      ¿La hipótesis principal es correcta y el fix propuesto tiene sentido?
      - 'approve' → continuar (crear rama de fix si se indicó base_branch)
      - 'reject'  → el workflow se detiene para re-analizar con más contexto
    options: [approve, reject]
    on_reject: abort

  - id: create-fix-branch
    type: if
    condition: "{{ inputs.base_branch != '' }}"
    then:
      - id: pr
        command: speckit.git-pr.create
        integration: "{{ inputs.integration }}"
        input:
          args: "{{ inputs.base_branch }}"
