installed:
  - atlassian-sync
  - figma-export
  - git-pr
  - md-html-export
settings:
  auto_execute_hooks: true
hooks:
  after_specify:
  - extension: md-html-export
    command: speckit.md-html-export.export
    enabled: true
    optional: false
    prompt: Generate HTML versions of the spec files?
    description: Convert spec.md to HTML after specification
    condition: null
  after_clarify:
  - extension: md-html-export
    command: speckit.md-html-export.export
    enabled: true
    optional: false
    prompt: Regenerate HTML after clarification updates?
    description: Convert spec.md to HTML after clarification
    condition: null
  after_plan:
  - extension: md-html-export
    command: speckit.md-html-export.export
    enabled: true
    optional: false
    prompt: Generate HTML versions of the plan files?
    description: Convert plan files to HTML after planning
    condition: null
  after_tasks:
  - extension: md-html-export
    command: speckit.md-html-export.export
    enabled: true
    optional: false
    prompt: Generate HTML versions of the task files?
    description: Convert tasks.md to HTML after task generation
    condition: null
  - extension: atlassian-sync
    command: speckit.atlassian-sync.push
    enabled: true
    optional: true
    prompt: Push stories and tasks to Jira?
    description: Create Jira Stories + Sub-tasks from spec.md and tasks.md
    condition: null
  after_checklist:
  - extension: md-html-export
    command: speckit.md-html-export.export
    enabled: true
    optional: false
    prompt: Generate HTML versions of the checklist files?
    description: Convert checklist files to HTML after generation
    condition: null
  after_implement:
  - extension: git-pr
    command: speckit.git-pr.create
    enabled: true
    optional: true
    prompt: Create a Pull Request for this feature?
    description: Open a GitHub PR after implementation is complete
    condition: null
