schema_version: "1.0"

preset:
  id: afianza-compliance
  name: "Afianza Compliance & Data Surface"
  version: "0.1.0"
  description: |
    Ligero. Añade a spec/plan secciones obligatorias para que cada feature
    declare explícitamente:
      1. Datos personales tratados (PII + base legal RGPD).
      2. Superficie de auth (tokens, scopes, claims de Entra ID).
      3. Datos cruzando servicios por RabbitMQ (exchange `internal`).
      4. Integraciones externas tocadas (AEAT, Sage, Graph, HubSpot, Jira).
    No introduce STRIDE/OWASP/NIST completos — solo el rastro mínimo
    para auditoría interna y revisiones de PO/seguridad.
  author: afianza-local
  license: MIT

requires:
  speckit_version: ">=0.7.2"

overrides:
  templates:
    - spec-template.md
    - plan-template.md

tags:
  - compliance
  - rgpd
  - afianza
