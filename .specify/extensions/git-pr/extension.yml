schema_version: "1.0"

extension:
  id: git-pr
  name: "Git PR Creator"
  version: "1.0.0"
  description: "Creates a GitHub Pull Request from the active feature branch using spec.md as source for title and description"
  author: afianza-local
  license: MIT

requires:
  speckit_version: ">=0.8.0"
  tools:
    - name: gh
      required: true

provides:
  commands:
    - name: speckit.git-pr.create
      file: commands/speckit.git-pr.create.md
      description: "Open a GitHub PR for the active feature branch with title and body derived from spec.md"

hooks:
  after_implement:
    command: speckit.git-pr.create
    optional: true
    prompt: "Create a Pull Request for this feature?"
    description: "Open a GitHub PR after implementation is complete"

tags:
  - git
  - github
  - pr
  - pull-request
